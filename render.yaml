services:
  # ── Backend: FastAPI ──────────────────────────────────────────────────────────
  - type: web
    name: tally-and-trace-api
    plan: free
    runtime: python
    # Co-locate with Supabase (ap-southeast-1) to kill cross-Pacific DB latency.
    # Live service confirmed running in Singapore (2026-07-16); the Oregon->SG
    # recreation is done. Render regions are immutable per service, so changing
    # this line again would require deleting and recreating the service — see the
    # runbook in HANDOVER Session 5 before touching it.
    region: singapore
    buildCommand: cd backend && pip install -r requirements.txt && alembic upgrade head
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    domains:
      - api.tallyandtrace.studiosc.dev
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: BACKEND_CORS_ORIGINS_STR
        value: https://tallyandtrace.studiosc.dev,https://tally-and-trace-web.onrender.com
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: FRONTEND_BASE_URL
        value: https://tallyandtrace.studiosc.dev
      # Refresh-token cookie shared across the web + api subdomains (same site),
      # https-only in production. See app/core/config.py REFRESH_COOKIE_*.
      - key: REFRESH_COOKIE_DOMAIN
        value: .studiosc.dev
      - key: REFRESH_COOKIE_SECURE
        value: true
      # Sentry. DSN is not secret, but keep it out of the repo so a fork does
      # not report into this project's quota. Blank/unset = Sentry disabled.
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"

  # ── Frontend: Vite React SPA ──────────────────────────────────────────────────
  - type: web
    name: tally-and-trace-web
    runtime: static
    buildCommand: cd frontend && pnpm install && pnpm run build
    staticPublishPath: ./frontend/dist
    domains:
      - tallyandtrace.studiosc.dev
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://api.tallyandtrace.studiosc.dev
      # Baked into the bundle at build time (Vite inlines VITE_* vars), so a
      # DSN change needs a redeploy, not just a restart.
      - key: VITE_SENTRY_DSN
        sync: false
      - key: VITE_SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"
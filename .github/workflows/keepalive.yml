name: Health canary – Tally & Trace API

# Checks that the API answers on /health. This is a CANARY, not a keep-alive.
#
# It was originally written as a */10 keep-alive, but GitHub throttles and drops
# high-frequency scheduled workflows on low-activity repos: the */10 cron
# actually fired ~13x/day (every ~1.8h, gaps up to 3.5h), never often enough to
# beat Render's ~15 min free-tier spin-down. Every run was hitting a cold boot,
# and runs where the boot ran long past 90s failed and paged us.
#
# Warmth is now the external monitor's job (UptimeRobot, /health every 5 min);
# see HANDOVER "Deployment Topology & Performance". This workflow stays only as
# a backstop until that monitor is confirmed live, at which point it can be
# deleted — the monitor covers both pinging and alerting.
#
# The timeout is deliberately generous: a cold boot is ~40-60s and we only want
# to fail on a genuinely dead service, not a slow wake.

on:
  schedule:
    - cron: "0 */6 * * *" # 4x/day — honest about what GitHub will actually run
  workflow_dispatch: {} # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          for attempt in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 180 \
              https://api.tallyandtrace.studiosc.dev/health) || code="timeout"
            echo "Attempt $attempt: /health returned $code"
            if [ "$code" = "200" ]; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep 30
            fi
          done
          echo "::error::/health did not return 200 after 3 attempts"
          exit 1
